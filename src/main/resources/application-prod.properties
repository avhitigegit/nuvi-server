# ─── PROD Profile ──────────────────────────────────────────────────────────────
# Production DB — credentials must be injected via environment variables
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Never auto-modify schema in production
spring.jpa.hibernate.ddl-auto=validate

# No SQL logging in production — performance + security
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
logging.level.org.springframework.security=WARN
logging.level.com.nuvi=WARN

# CORS — allow production frontend domain only
app.cors.allowed-origins=https://nuvi-renting.com,https://www.nuvi-renting.com
