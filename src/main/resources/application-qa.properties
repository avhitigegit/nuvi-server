# ─── QA Profile ────────────────────────────────────────────────────────────────
# QA environment DB — update credentials for your QA server
spring.datasource.url=jdbc:mysql://qa-db-host:3306/online_renting_qa
spring.datasource.username=qa_user
spring.datasource.password=qa_pass

# Validate schema only — never auto-modify DB in QA
spring.jpa.hibernate.ddl-auto=validate

# Show SQL for QA debugging but keep security logs minimal
spring.jpa.show-sql=true
logging.level.org.springframework.security=WARN
logging.level.com.nuvi=INFO

# CORS — allow QA frontend domain
app.cors.allowed-origins=https://qa.nuvi-renting.com
