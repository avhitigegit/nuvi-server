# ─── DEV Profile ───────────────────────────────────────────────────────────────
# Local Docker MySQL (port 3307)
spring.datasource.url=jdbc:mysql://localhost:3307/online_renting
spring.datasource.username=renting_user
spring.datasource.password=renting_pass

# Auto-create/update schema on startup — safe for local development only
spring.jpa.hibernate.ddl-auto=update

# Log all SQL queries to console for debugging
spring.jpa.show-sql=true

# Verbose security logging for debugging auth issues
logging.level.org.springframework.security=DEBUG
logging.level.com.nuvi=DEBUG

# In-memory admin user for Spring Security's basic auth (used in dev only)
spring.security.user.name=admin
spring.security.user.password=1234

# CORS — allow local frontend dev servers
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200,http://localhost:5173
